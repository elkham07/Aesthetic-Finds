<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QazaqSpeak Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-left">
            🇰🇿 QazaqSpeak Bot
        </div>
    
        <div class="header-right">
            <button onclick="openInstagram()">📸</button>
            <button onclick="openTikTok()">🎵</button>
            <button onclick="clearChat()">🗑</button>
        </div>
    </div>
    
    <div class="chat-box" id="chatBox"></div>

    <div class="buttons">
        <button onclick="lessonMode()">📖 Слова</button>
        <button onclick="quizMode()">🧠 Тест</button>
        <button onclick="slangMode()">🔥 Сленг</button>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши сообщение...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>


<script src="script.js"></script>
</body>
</html>
